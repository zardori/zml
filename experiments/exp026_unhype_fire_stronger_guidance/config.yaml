slurm_time: "12:00:00"
method: unhype
model_id: THUDM/CogVideoX-5b
clip_model_id: openai/clip-vit-large-patch14
# exp024/exp025 both left fire fully intact at step 500. Diagnosis: the bottleneck is upstream of
# the removal-loss form. The simulated SGD target (-lr*grad_theta loss_task) is tiny and noisy
# (loss_task ~1e-3, grad_theta ~1e-2, target_step_norm ~2e-3), so there is no stable erasure
# direction to match. exp025's cosine loss_remove_direction oscillated ~0.94-1.0 over 500 steps
# with no downward trend -> predicted_step never aligned. Root cause: negative_guidance_scale=1.0
# barely displaces the steered target from the concept prediction. This run raises the guidance so
# the target carries a real erasure direction for the cosine term to lock onto.
target_mapping_path: prompts/cogvideox_fire_unhype.csv
retain_prompts_path: prompts/cogvideox_fire_preservation.csv
control_concept_prompts: prompts/cogvideox_fire_control_fire.csv
control_related_prompts: prompts/cogvideox_fire_control_related.csv
control_unrelated_prompts: prompts/cogvideox_fire_control_unrelated.csv
lora_rank: 4
lora_alpha: 4.0
num_unlearning_steps: 300
simulated_lr: 0.3
# eps_steered = eps_mapping - scale*(eps_concept - eps_mapping). At scale 1.0 the steered target sat
# right on top of the concept prediction, so loss_task and its gradient were weak/directionless.
# 3.0 triples the erasure displacement -> larger, more consistent target_step direction. First
# calibration point; bump toward 5 if loss_remove_direction still does not fall.
negative_guidance_scale: 3.0
removal_weight: 1.0
retain_weight: 0.3
hypernet_hidden_dim: 512
hypernet_num_layers: 2
hypernet_step_embedding_dim: 128
learning_rate: 0.0001
steps: 1000
save_interval: 500
eval_num_prompts: 5
eval_inference_steps: 50
global_seed: 42
# Keep exp025's cosine removal loss (the only variant that actually moved the weights), but let the
# direction term dominate: drop the magnitude anchor 1.0 -> 0.1 so it stops squeezing predicted_step
# toward the tiny target norm while direction is still aligning.
remove_loss_type: cosine
remove_magnitude_weight: 0.1
