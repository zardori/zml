slurm_time: "12:00:00"
method: unhype
model_id: THUDM/CogVideoX-5b
clip_model_id: openai/clip-vit-large-patch14
# exp023 left the endpoint adapter a no-op: MSE(predicted_step, target_step) was dominated by
# ||predicted_step|| (~120x the target), so its gradient shrank the step to zero instead of
# steering it. This run attacks the loss *form* (not the magnitude): a scale-robust removal loss
# that separates direction (cosine) from magnitude. simulated_lr stays 0.3 to isolate the effect.
target_mapping_path: prompts/cogvideox_fire_unhype.csv
retain_prompts_path: prompts/cogvideox_fire_preservation.csv
control_concept_prompts: prompts/cogvideox_fire_control_fire.csv
control_related_prompts: prompts/cogvideox_fire_control_related.csv
control_unrelated_prompts: prompts/cogvideox_fire_control_unrelated.csv
lora_rank: 4
lora_alpha: 4.0
num_unlearning_steps: 300
simulated_lr: 0.3
negative_guidance_scale: 1.0
removal_weight: 1.0
retain_weight: 0.3
hypernet_hidden_dim: 512
hypernet_num_layers: 2
hypernet_step_embedding_dim: 128
learning_rate: 0.0001
steps: 1000
save_interval: 500
eval_num_prompts: 5
eval_inference_steps: 50
global_seed: 42
# loss_remove = (1 - cos(pred, target)) + remove_magnitude_weight*(||pred|| - ||target||)^2.
# The direction term aligns the step with the erasure gradient without driving its magnitude to 0;
# the magnitude term is a subordinate soft anchor.
remove_loss_type: cosine
remove_magnitude_weight: 1.0
