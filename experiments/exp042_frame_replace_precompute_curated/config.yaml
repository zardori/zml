# Precompute the edited-target latents consumed by the `frame_replace` unlearning method.
# Run with: ./submit_job.py athena experiments/exp042_frame_replace_precompute_curated/config.yaml
job_type: precompute
method: frame_replace

# Built dataset (latents/ + metadata.json) lands in this run's outputs_{timestamp} dir.
# The training run (exp043) points its metadata_file/latents_dir at that directory.
#
# Unlike exp034 (21 hand-written prompts, 16 of which passed) this runs on the curated set:
# those 21 plus the 50 (prompt, seed) pairs the exp040 search agent vetted as partial-fire.
# Re-generating the full set in one pass keeps a single immutable erase dataset per CSV version
# (scalar metadata_file/latents_dir downstream — no fragment merging, no list-valued grid axis).
# Prompts that don't render usable partial fire are auto-skipped, same as exp034.
csv_path: prompts/cogvideox_partial_fire_curated.csv

model_id: THUDM/CogVideoX-5b
num_inference_steps: 50
guidance_scale: 6.0
frame_fire_threshold: 0.5
min_nofire_frames: 2

slurm_time: "16:00:00"
