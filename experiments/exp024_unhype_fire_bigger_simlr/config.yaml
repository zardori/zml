slurm_time: "12:00:00"
method: unhype
model_id: THUDM/CogVideoX-5b
clip_model_id: openai/clip-vit-large-patch14
# exp023 left the endpoint adapter a no-op: loss_remove = MSE(predicted_step, target_step) had a
# ~120x scale gap (predicted ~0.13-0.36 vs target ~0.002), so its gradient just shrank the step to
# zero (trajectory collapsed to constant-in-s) instead of steering it. This run attacks the gap
# with a single knob: simulated_lr up ~100x.
target_mapping_path: prompts/cogvideox_fire_unhype.csv
retain_prompts_path: prompts/cogvideox_fire_preservation.csv
control_concept_prompts: prompts/cogvideox_fire_control_fire.csv
control_related_prompts: prompts/cogvideox_fire_control_related.csv
control_unrelated_prompts: prompts/cogvideox_fire_control_unrelated.csv
lora_rank: 4
lora_alpha: 4.0
num_unlearning_steps: 300
# ~100x exp023 (0.3): target_step ~ simulated_lr*||grad_theta|| ~ 30*0.007 ~ 0.2, the same order
# as the hypernet's natural predicted_step (0.13-0.36). Closes the 120x gap so MSE grows B along
# the erasure direction instead of shrinking the step to zero.
simulated_lr: 30.0
negative_guidance_scale: 1.0
removal_weight: 1.0
retain_weight: 0.3
hypernet_hidden_dim: 512
hypernet_num_layers: 2
hypernet_step_embedding_dim: 128
learning_rate: 0.0001
steps: 1000
save_interval: 500
eval_num_prompts: 5
eval_inference_steps: 50
global_seed: 42
